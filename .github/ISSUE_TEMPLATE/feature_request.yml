name: Feature request
description: Suggest a privacy-preserving improvement.
body:
  - type: textarea
    id: need
    attributes:
      label: User need
      description: Describe the problem rather than only a proposed implementation.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and offline impact
      description: Note any new network, storage, or model requirements.
